version: "3.8"

services:
  jarvis:
    build: .
    ports:
      - "4242:4242"
    volumes:
      - jarvis-data:/root/.jarvis
    environment:
      - PORT=4242
      - LMS_URL=http://host.docker.internal:1234
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  jarvis-data:
